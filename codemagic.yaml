# Cần khai báo biến bí mật GEMINI_API_KEY trong Codemagic UI
# (App settings → Environment variables, tick Secure) để lệnh build đọc được.
# Không mạng/không key → app tự dùng phân tích on-device (ML Kit).
workflows:
  ios-release-unsigned:
    name: iOS release (chưa ký — dùng cho Sideloadly)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      flutter: 3.41.9
      xcode: latest
    scripts:
      - name: Cài dependencies
        script: flutter pub get
      - name: Build iOS release (không ký)
        script: flutter build ios --release --no-codesign --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY
      - name: Đóng gói .ipa từ Runner.app
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r Doka.ipa Payload
    artifacts:
      - build/ios/iphoneos/Doka.ipa

  android-release:
    name: Android release APK
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      flutter: 3.41.9
    scripts:
      - name: Cài dependencies
        script: flutter pub get
      - name: Chạy tests
        script: flutter test
      - name: Build APK release
        script: flutter build apk --release --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
